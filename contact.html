<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Carbon Prime | Carbon Fibre for BMW</title>
<meta name="description" content="Get in touch with Carbon Prime. Questions about fitment, ceramic coating, orders or delivery for your BMW carbon fibre parts." />
<link rel="canonical" href="https://carbonprime.netlify.app/contact.html" />
<meta name="robots" content="index, follow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="contact">
<div id="site-header"></div>
<main class="page">
  <div class="pagehead"><div class="wrap">
    <div class="crumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Contact</span></div>
    <h1>Get in touch</h1>
    <p>Fitment questions, order help, or trade enquiries - drop us a line.</p>
  </div></div>

  <div class="wrap"><div class="contact-grid">
    <div class="contact-form">
      <form id="contactForm">
        <div class="field"><label>Name</label><input type="text" placeholder="Your name" required></div>
        <div class="field"><label>Email</label><input type="email" placeholder="you@email.com" required></div>
        <div class="field"><label>Message</label><textarea placeholder="How can we help?" required></textarea></div>
        <button class="btn btn-primary btn-block" type="submit">Send message</button>
        <p class="auth-note" style="text-align:left">We usually reply within one working day.</p>
      </form>
    </div>

    <aside class="contact-info">
      <div class="ci"><div class="l">Email</div><a href="mailto:carbon.prime@outlook.com">carbon.prime@outlook.com</a></div>
      <div class="ci"><div class="l">Instagram</div><a href="https://www.instagram.com/carbonprime_uk/" target="_blank" rel="noopener">@carbonprime_uk</a></div>
      <div class="ci"><div class="l">TikTok</div><a href="https://www.tiktok.com/@carbonprime_uk" target="_blank" rel="noopener">@carbonprime_uk</a></div>
      <div class="ci"><div class="l">Hours</div><span>Mon-Fri &middot; 9am-5pm</span></div>
      <div class="ci"><div class="l">Based</div><span>United Kingdom</span></div>
    </aside>
  </div></div>
</main>
<div id="site-footer"></div>
<script src="assets/main.js"></script>
</body>
</html>
